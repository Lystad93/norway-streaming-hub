services:
  streaminghub:
    # Image is built & pushed to GHCR by .github/workflows/docker-publish.yml.
    # Set STREAMINGHUB_IMAGE in your ROOT .env, e.g.
    #   STREAMINGHUB_IMAGE=ghcr.io/<owner>/<repo>:latest
    image: ${STREAMINGHUB_IMAGE?}
    container_name: streaminghub
    restart: unless-stopped
    expose:
      - 7000
    env_file:
      - .env # app-level secrets only (TMDB key). See .env.example.
    environment:
      # Must match the Traefik loadbalancer port below. App is stateless —
      # config lives in the install URL, not on disk, so no volume is needed.
      - PORT=7000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.streaminghub.rule=Host(`${STREAMINGHUB_HOSTNAME?}`)"
      - "traefik.http.routers.streaminghub.entrypoints=websecure"
      - "traefik.http.routers.streaminghub.tls.certresolver=letsencrypt"
      - "traefik.http.routers.streaminghub.middlewares=authelia@docker"
      - "traefik.http.services.streaminghub.loadbalancer.server.port=7000"
    # networks:
    #   - ${DOCKER_NETWORK:-aio_default}
    profiles:
      - streaminghub
      - all
# networks:
#   ${DOCKER_NETWORK:-aio_default}:
#     external: true
